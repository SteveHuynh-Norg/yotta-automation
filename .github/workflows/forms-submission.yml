name: forms-submission

# CI/CD for the contact-form submission suite.
#
# This is SEPARATE from the directory-verification `CI` workflow because a run
# sends a REAL (clearly self-identified) enquiry through the live form, and it
# needs the reCAPTCHA bypass secret.
#
# Triggers:
#   - push / pull_request that touch form-submission code → run the fast @smoke
#     subset (a few representative forms) so changes to this suite are verified
#     here, NOT in the directory CI (which ignores these same paths)
#   - schedule          → weekly full-estate health check
#   - workflow_dispatch → manual run (full estate, or one form via `form`)
#
# Submissions are real, so push/PR runs only the small @smoke subset; the full
# ~75-form sweep runs on schedule / manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - 'tests/form-submission.spec.ts'
      - 'config/forms.ts'
      - 'src/pages/ContactPage.ts'
      - 'src/pages/BasePage.ts'
      - 'src/utils/qaBypass.ts'
      - 'src/types/index.ts'
      - 'fixtures/test-fixtures.ts'
      - 'playwright.config.ts'
      - '.github/workflows/forms-submission.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tests/form-submission.spec.ts'
      - 'config/forms.ts'
      - 'src/pages/ContactPage.ts'
      - 'src/pages/BasePage.ts'
      - 'src/utils/qaBypass.ts'
      - 'src/types/index.ts'
      - 'fixtures/test-fixtures.ts'
      - 'playwright.config.ts'
      - '.github/workflows/forms-submission.yml'
  schedule:
    # Mondays at 07:30 ICT (GMT+7) == 00:30 UTC.
    - cron: '30 0 * * 1'
  workflow_dispatch:
    inputs:
      form:
        description: 'Run only one form by key (blank = all enabled forms)'
        required: false
        default: ''

# Never run two form submissions concurrently — keep enquiries serialised.
concurrency:
  group: forms-submission-${{ github.ref }}
  cancel-in-progress: false

jobs:
  submit:
    name: Verify contact form submission
    runs-on: ubuntu-latest
    # Forms run serially (--workers=1) to avoid the rate-related flakiness the
    # estate shows under parallel load; the full sweep is ~75 forms, so allow
    # generous headroom over the previous 20m (which the full run exceeded).
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run form-submission test
        env:
          # Shared HMAC secret for the reCAPTCHA QA bypass (from qa-bypass-url.sh).
          # Stored as a repo/Actions secret — never committed.
          QA_BYPASS_SECRET: ${{ secrets.QA_BYPASS_SECRET }}
          # Static token for the X-QA-Bypass header (gets the browser past
          # Cloudflare Bot Fight Mode on the BND zones). Stored as an Actions secret.
          QA_BYPASS_HEADER: ${{ secrets.QA_BYPASS_HEADER }}
          FORM: ${{ github.event.inputs.form }}
          # Posts the run summary to Slack (no-op when the secret is unset).
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          EVENT_NAME: ${{ github.event_name }}
        # Serial + a single retry to bound runtime and avoid parallel rate
        # flakiness. push/PR runs the fast @smoke subset; schedule / manual
        # dispatch run the full @forms estate.
        run: |
          if [ "$EVENT_NAME" = "schedule" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Running FULL form estate (@forms)"
            npx playwright test --grep @forms --workers=1 --retries=1
          else
            echo "Running @smoke subset (push/PR)"
            npx playwright test --grep @smoke --workers=1 --retries=1
          fi

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: forms-submission-report
          path: playwright-report/
          retention-days: 14
